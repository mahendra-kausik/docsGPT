name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest   # pure-Python at Layer 0; fast & free-tier friendly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # matches local dev env
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
