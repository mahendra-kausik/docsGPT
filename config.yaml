# Single source of truth for all TUNABLES (CLAUDE.md §6: config over constants).
# Secrets/keys live in .env (never here). Flip a value here to run an ablation.
# These tunables take precedence over any matching value in .env (see src/config.py).

# --- Model ids (verify live free-tier limits per PROJECT_PLAN §7 before relying on them) ---
embedding_model: BAAI/bge-small-en-v1.5   # 384-dim default; benchmark vs bge-base (D-005)
reranker_model: BAAI/bge-reranker-base    # cross-encoder, CPU (D-007)
synthesis_model: gemini-flash             # final answer synthesis (verify exact id in AI Studio)
cheap_model: groq/llama-3.1-8b-instant    # decompose/grade/rewrite + RAGAS judge (D-008)

# --- Retrieval / fusion ---
rrf_k: 60             # RRF constant: score(d) = sum 1/(k + rank_i(d))  (D-006)
retrieve_top_k: 50    # candidates fetched before reranking
rerank_top_n: 6       # candidates kept after cross-encoder rerank (D-007)

# --- Chunking (Layer 1: structure-aware; never split a code block) ---
chunk_size: 1000        # target characters per chunk
chunk_overlap: 150
min_chunk_chars: 24     # drop near-empty chunks (heading-only / lone image link) with no code

# --- Paths ---
corpus_jsonl: data/corpus/chunks.jsonl    # durable chunked corpus, the source of truth (D-004)
results_dir: results                       # eval results JSON — reproducible record (D-010)

# --- Corpus source (Layer 1a: LangChain/LangGraph OSS docs, MIT-licensed) ---
# Ingested from the MIT-licensed langchain-ai/docs repo (.mdx source), Python-focused
# scope (D-016). The raw clone lives in raw_dir (git-ignored); chunks.jsonl is committed.
corpus:
  repo: https://github.com/langchain-ai/docs.git
  ref: main                                 # cloned, then the exact SHA is pinned in the manifest
  raw_dir: data/raw/langchain-docs
  snippets_dir: src/snippets                # for best-effort <Snippet>/import inlining
  docs_base_url: https://docs.langchain.com # local path -> public URL for citations
  include_globs:                            # Python-focused OSS docs (excludes js, langsmith, snippets, reference, contributing)
    - src/oss/python/**
    - src/oss/langchain/**
    - src/oss/langgraph/**
    - src/oss/deepagents/**
    - src/oss/concepts/**
    - src/oss/integrations/**
    - src/oss/*.mdx
